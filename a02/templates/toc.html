<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Примеры marimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
     <div class="container mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold text-center">
           Запускаем блокноты marimo из веб-приложения FastAPI
      </h1> 
      
      <h2 class="text-2xl text-center font-semibold mb-4">
        Доступные блокноты marimo:
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 ">
        {% for item in items %}
        <a href="/{{ item['url'] }}" class="block" target="{{ item['url'] }}" >
          <div class="flex flex-col bg-white min-h-48 rounded-lg shadow-md hover:shadow-lg transition-shadow duration-300 p-4">
            <h3 class="text-lg font-semibold text-blue-600 hover:text-blue-800">{{ item['name'] }}</h3>
            <h4 class="flex-grow text-md font-semibold text-black-800">{{ item['title'] }}</h4>

            <p class="text-gray-600 mt-2 text-sm">Щелкните мышью, чтобы открыть приложение</p>
          </div>
        </a>
        {% endfor %}
      </div>     
    </div>
  </body>
</html>
